<div
  class="cx-radio-reveal"
  [class.cx-radio-reveal--without-label]="!hasLabel$()"
>
  @if (hasLabel$()) {
    <div class="cx-radio-reveal__label">{{ label.trim() }}</div>
  }

  <div class="cx-radio-reveal__content">
    @for (option of options$(); track option.id) {
      <div class="cx-radio-reveal__option">
        <cx-radio
          [text]="option.label"
          [hint]="option.hint"
          [selected]="selectedId$() === option.id"
          [disabled]="disabled"
          (selectedChange)="onOptionCheckedChange(option.id, $event)"
        />

        @if (selectedRevealOption$()?.id === option.id) {
          <div class="cx-radio-reveal__field">
            <cx-input
              [label]="''"
              [ariaLabel]="getRevealAriaLabel(option)"
              [placeholder]="option.revealPlaceholder ?? ''"
              [hint]="option.revealHint"
              [disabled]="disabled"
              [value]="revealValueState()"
              (valueChange)="onRevealValueChange($event)"
            />
          </div>
        }
      </div>
    }
  </div>
</div>
