<div class="cx-null-controller">
  <div class="cx-null-controller__header">
    @if (hasLabel$()) {
      <div class="cx-null-controller__label">{{ label.trim() }}</div>
    }

    <cx-switch
      [text]="switchLabel.trim() || 'Override'"
      [selected]="enabled$()"
      [disabled]="disabled"
      (selectedChange)="onEnabledChange($event)"
    />
  </div>

  @if (hasDescription$()) {
    <p class="cx-null-controller__description">{{ description!.trim() }}</p>
  }

  <div class="cx-null-controller__options">
    @for (option of options$(); track option.id) {
      <cx-radio
        [text]="option.label"
        [hint]="option.hint"
        [selected]="isSelected(option.id)"
        [disabled]="radiosDisabled$()"
        (selectedChange)="onOptionCheckedChange(option.id, $event)"
      />
    }
  </div>
</div>
