<header class="cx-topbar">
  <div class="cx-topbar__left" role="navigation" aria-label="Breadcrumb">
    @if (loading) {
      <cx-loader class="cx-topbar__loader cx-topbar__loader--breadcrumbs" [loader]="breadcrumbLoader" />
    } @else {
      @if (!navbarVisible) {
        <cx-icon-button
          icon="sidebar-right"
          [ariaLabel]="'Show navigation'"
          variant="transparent"
          (pressed)="onNavbarShow()"
        />
      }
      <cx-breadcrumbs
        [items]="breadcrumbs$()"
        [ariaLabel]="'Breadcrumb'"
        (itemSelect)="onBreadcrumbSelect($event)"
      />
    }
  </div>

  <div class="cx-topbar__center">
    @if (!loading && tabs$().length > 0) {
      <cx-tabs
        [items]="tabs$()"
        [selectedId]="selectedTab$()"
        variant="transparent"
        ariaLabel="Page sections"
        (selectedIdChange)="onTabSelect($event)"
      />
    }
  </div>

  <div class="cx-topbar__actions">
    @if (loading) {
      <cx-loader class="cx-topbar__loader cx-topbar__loader--actions" [loader]="actionLoader" />
    } @else {
      <ng-content select="[actions]" />
      @for (item of primaryActions$(); track item.id) {
        <cx-button
          [text]="item.text ?? ''"
          [icon]="item.icon"
          [variant]="item.variant ?? 'transparent'"
          [mood]="item.mood ?? 'default'"
          [disabled]="item.disabled ?? false"
          (pressed)="onAction(item.id)"
        />
      }
      @if (hasContextMenu$()) {
        <cx-menu
          [items]="contextMenuItems$()"
          [ariaLabel]="'Open topbar actions'"
          [open]="menuOpen$()"
          (openChange)="onMenuOpenChange($event)"
          (itemSelect)="onAction($event)"
        >
          <cx-icon-button
            trigger
            icon="menu-vertical"
            [ariaLabel]="'Open topbar actions'"
            variant="transparent"
          />
        </cx-menu>
      }
    }
  </div>
</header>
