<svg class="cx-spinner__svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
  @if (mode$() === 'countdown') {
    <g transform="rotate(-90 12 12)">
      @for (segment of segmentArcs$(); track segment.index) {
        <circle
          class="cx-spinner__segment"
          [class.cx-spinner__segment--filled]="segment.filled"
          cx="12"
          cy="12"
          r="9.25"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="butt"
          pathLength="100"
          [attr.stroke-dasharray]="segment.dash"
          [attr.stroke-dashoffset]="segment.offset"
        />
      }
    </g>
  } @else {
    <circle class="cx-spinner__track" cx="12" cy="12" r="9.25" stroke="currentColor" stroke-width="1.5" />
    <circle
      class="cx-spinner__arc"
      cx="12"
      cy="12"
      r="9.25"
      stroke="currentColor"
      stroke-width="1.5"
      stroke-linecap="round"
      pathLength="100"
      stroke-dasharray="25 100"
    />
  }
</svg>
