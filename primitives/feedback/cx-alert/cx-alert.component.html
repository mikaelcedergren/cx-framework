@if (hasText()) {
  @if (resolvedIcon; as iconName) {
    <div class="cx-alert__icon" aria-hidden="true">
      <cx-icon [name]="iconName" />
    </div>
  }

  <div class="cx-alert__text">
    {{ text }}

    @if (hasActions()) {
      <div class="cx-alert__actions">
        @if (visibleAction; as action) {
          <button
            type="button"
            class="cx-alert__action cx-alert__action--primary"
            [disabled]="action.disabled || action.loading"
            [attr.aria-label]="action.ariaLabel"
            [attr.aria-busy]="action.loading ? 'true' : null"
            (click)="onActionSelect(action)"
          >
            @if (action.icon; as iconName) {
              <cx-icon class="cx-alert__action-icon" [name]="iconName" [size]="16" />
            }
            <span>{{ action.text }}</span>
            @if (action.appendIcon; as iconName) {
              <cx-icon class="cx-alert__action-icon" [name]="iconName" [size]="16" />
            }
          </button>
        }
        @if (visibleSecondaryAction; as action) {
          <button
            type="button"
            class="cx-alert__action cx-alert__action--secondary"
            [disabled]="action.disabled || action.loading"
            [attr.aria-label]="action.ariaLabel"
            [attr.aria-busy]="action.loading ? 'true' : null"
            (click)="onSecondaryActionSelect(action)"
          >
            @if (action.icon; as iconName) {
              <cx-icon class="cx-alert__action-icon" [name]="iconName" [size]="16" />
            }
            <span>{{ action.text }}</span>
            @if (action.appendIcon; as iconName) {
              <cx-icon class="cx-alert__action-icon" [name]="iconName" [size]="16" />
            }
          </button>
        }
      </div>
    }
  </div>

  @if (dismissible) {
    <button
      type="button"
      class="cx-alert__dismiss"
      aria-label="Dismiss alert"
      (click)="onDismiss()"
    >
      <cx-icon name="remove" [size]="16" aria-hidden="true" />
    </button>
  }
}
