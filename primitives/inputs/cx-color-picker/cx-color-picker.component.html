<div class="cx-color-picker" [class.cx-color-picker--disabled]="disabled$()">
  <button
    type="button"
    class="cx-color-picker__trigger"
    [disabled]="disabled$()"
    [attr.aria-expanded]="open$()"
    aria-haspopup="listbox"
    [attr.aria-readonly]="readOnly$() ? 'true' : null"
    (click)="onTrigger()"
  >
    <span
      class="cx-color-picker__swatch"
      [class.cx-color-picker__swatch--empty]="!value$()"
      [attr.data-color]="value$()"
    ></span>
    @if (showValue$()) {
      <span class="cx-color-picker__value">
        @if (selectedOption$(); as option) {
          {{ option.label }}
        } @else {
          {{ placeholder$() }}
        }
      </span>
    }
    <cx-icon class="cx-color-picker__chevron" name="chevron-down" [size]="16" />
  </button>

  @if (open$()) {
    <div class="cx-color-picker__panel" role="listbox">
      @if (clearable$()) {
        <button
          type="button"
          class="cx-color-picker__option cx-color-picker__option--clear"
          [class.cx-color-picker__option--selected]="!value$()"
          (click)="onSelect(undefined)"
        >
          <span class="cx-color-picker__swatch cx-color-picker__swatch--empty"></span>
          <span>None</span>
        </button>
      }
      @for (option of options$(); track option.value) {
        <button
          type="button"
          class="cx-color-picker__option"
          [class.cx-color-picker__option--selected]="value$() === option.value"
          role="option"
          [attr.aria-selected]="value$() === option.value"
          (click)="onSelect(option.value)"
        >
          <span class="cx-color-picker__swatch" [attr.data-color]="option.value"></span>
          <span>{{ option.label }}</span>
        </button>
      }
    </div>
  }
</div>
