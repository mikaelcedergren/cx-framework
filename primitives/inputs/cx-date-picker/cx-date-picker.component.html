<div class="cx-date-picker">
  <div
    #field
    class="cx-date-picker__field"
    [class.cx-date-picker__field--small]="size === 'small'"
    [class.cx-date-picker__field--large]="size === 'large'"
    [class.cx-date-picker__field--open]="isOpen$()"
    [class.cx-date-picker__field--focused]="focused$()"
    [class.cx-date-picker__field--disabled]="disabled"
    [class.cx-date-picker__field--readonly]="readOnly"
    [class.cx-date-picker__field--loading]="loading"
    [class.cx-date-picker__field--error]="hasError$()"
    [class.cx-date-picker__field--empty]="showPlaceholder$()"
    role="combobox"
    [attr.tabindex]="isLocked$() ? -1 : 0"
    [attr.aria-disabled]="isLocked$() ? 'true' : null"
    [attr.aria-expanded]="isOpen$()"
    [attr.aria-controls]="isOpen$() ? surfaceId : null"
    [attr.aria-haspopup]="'dialog'"
    [attr.aria-invalid]="hasError$() ? 'true' : null"
    [attr.aria-readonly]="readOnly ? 'true' : null"
    [attr.aria-busy]="loading ? 'true' : null"
    [attr.aria-label]="resolvedFieldAriaLabel"
    [attr.aria-describedby]="validationMessages$().length > 0 ? messagesId : null"
    (click)="toggleOpen(field)"
    (keydown)="onFieldKeydown($event, field)"
    (focus)="onFieldFocus(true)"
    (blur)="onFieldFocus(false)"
  >
    <cx-icon class="cx-date-picker__field-icon" name="calendar" size="16" />
    <span class="cx-date-picker__field-text" [class.cx-date-picker__field-text--placeholder]="showPlaceholder$()">
      {{ displayText$() }}
    </span>
    @if (hasClear$()) {
      <button type="button" class="cx-date-picker__clear" aria-label="Clear" (click)="onClear($event)">
        <cx-icon name="remove" size="16" />
      </button>
    }
  </div>

  @if (validationMessages$().length > 0) {
    <div class="cx-date-picker__messages" [id]="messagesId">
      <cx-validation-message [messages]="validationMessages$()" [showAll]="true" />
    </div>
  }

  @if (isOpen$()) {
    <cx-popover
      [open]="true"
      [showBackdrop]="true"
      [surfaceId]="surfaceId"
      [width]="overlayWidth$()"
      [maxHeight]="overlayMaxHeight$()"
      [left]="overlayLeft$()"
      [top]="overlayTop$()"
      [bottom]="overlayBottom$()"
      [role]="'dialog'"
      [ariaLabel]="'Choose date'"
      surfaceClass="cx-date-picker__surface"
      (backdropPressed)="toggleOpen()"
    >
      <div class="cx-date-picker__surface-inner">
        <div class="cx-date-picker__calendar-header">
          <cx-icon-button
            icon="chevron-left"
            variant="transparent"
            size="small"
            ariaLabel="Previous month"
            [disabled]="disabled"
            (pressed)="onPreviousMonth()"
          />

          <div class="cx-date-picker__calendar-controls">
            <cx-select
              class="cx-date-picker__select-shell cx-date-picker__select-shell--month"
              label=""
              ariaLabel="Month"
              placeholder="Month"
              [availableValues]="monthOptions"
              [value]="viewMonthValue$()"
              [disabled]="disabled"
              (valueChange)="onMonthChange($event)"
            />

            <cx-select
              class="cx-date-picker__select-shell cx-date-picker__select-shell--year"
              label=""
              ariaLabel="Year"
              placeholder="Year"
              [availableValues]="yearOptions$()"
              [value]="viewYearValue$()"
              [disabled]="disabled"
              (valueChange)="onYearChange($event)"
            />
          </div>

          <cx-icon-button
            icon="chevron-right"
            variant="transparent"
            size="small"
            ariaLabel="Next month"
            [disabled]="disabled"
            (pressed)="onNextMonth()"
          />
        </div>

        <div class="cx-date-picker__weekdays">
          @for (weekday of weekdayLabels$(); track weekday) {
            <div class="cx-date-picker__weekday">{{ weekday }}</div>
          }
        </div>

        <div class="cx-date-picker__grid" role="grid">
          @for (day of calendarDays$(); track day.key) {
            <button
              type="button"
              class="cx-date-picker__day"
              [class.cx-date-picker__day--outside]="!day.inCurrentMonth"
              [class.cx-date-picker__day--today]="day.isToday"
              [class.cx-date-picker__day--selected]="isSelectedDay(day)"
              [disabled]="disabled || isOutsideRange(day)"
              [attr.aria-label]="day.isoDate"
              [attr.aria-pressed]="isSelectedDay(day)"
              (click)="onDaySelect(day)"
            >
              {{ day.day }}
            </button>
          }
        </div>

        @if (timeEnabled) {
          <div class="cx-date-picker__divider"></div>
          <div class="cx-date-picker__time-row">
            <cx-time-input
              class="cx-date-picker__time"
              label=""
              ariaLabel="Time"
              [format]="timeFormat"
              [value]="selectedTimeValue$()"
              [disabled]="isLocked$() || !selectedDate$() || effectiveAllDay$()"
              [readOnly]="readOnly"
              [loading]="loading"
              (valueChange)="onTimeValueChange($event)"
            />

            @if (allDayEnabled) {
              <cx-checkbox
                text="All day"
                [selected]="effectiveAllDay$()"
                [disabled]="disabled"
                (selectedChange)="onAllDayChange($event)"
              />
            }
          </div>
        }
      </div>
    </cx-popover>
  }
</div>
