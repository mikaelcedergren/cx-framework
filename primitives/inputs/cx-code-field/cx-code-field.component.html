<div
  class="cx-code-field"
  [class.cx-code-field--disabled]="disabled$()"
  [class.cx-code-field--readonly]="readOnly$()"
  [class.cx-code-field--error]="hasError$()"
>
  <div
    #cells
    class="cx-code-field__cells"
    role="group"
    [attr.aria-label]="resolvedAriaLabel"
  >
    @for (cell of cells$(); track $index) {
      <input
        #cellInput
        class="cx-code-field__cell"
        type="text"
        maxlength="1"
        autocorrect="off"
        spellcheck="false"
        [class.cx-code-field__cell--filled]="cell !== ''"
        [class.cx-code-field__cell--active]="focused$() && $index === activeIndex$()"
        [attr.autocomplete]="$index === 0 ? 'one-time-code' : 'off'"
        [attr.inputmode]="inputMode$()"
        [attr.pattern]="pattern$()"
        [attr.autocapitalize]="mode$() === 'alphanumeric' ? 'characters' : 'none'"
        [attr.aria-label]="cellAriaLabel($index)"
        [attr.aria-describedby]="resolvedAriaDescribedBy"
        [attr.aria-invalid]="hasError$() ? 'true' : null"
        [attr.aria-readonly]="readOnly$() ? 'true' : null"
        [disabled]="disabled$()"
        [readOnly]="readOnly$()"
        [value]="cell"
        [autofocus]="autoFocus && $index === 0"
        (input)="onCellInput($index, $event)"
        (focus)="onCellFocus($index)"
        (blur)="onCellBlur()"
        (click)="onCellClick($index)"
        (keydown)="onCellKeydown($index, $event)"
        (paste)="onCellPaste($index, $event)"
      />
    }
  </div>

  @if (validationMessages$().length > 0) {
    <div class="cx-code-field__messages" [id]="messagesId">
      <cx-validation-message [messages]="validationMessages$()" [showAll]="true" />
    </div>
  }
</div>
