<label
  class="cx-big-checkbox"
  [class.cx-big-checkbox--checked]="selected$()"
  [class.cx-big-checkbox--indeterminate]="indeterminate$()"
  [class.cx-big-checkbox--disabled]="disabled"
>
  <input
    class="cx-big-checkbox__input"
    type="checkbox"
    [checked]="selected$()"
    [indeterminate]="indeterminate$()"
    [disabled]="disabled"
    [attr.aria-label]="heading || text || null"
    (change)="onNativeChange($event)"
    (focus)="onFocus(true)"
    (blur)="onFocus(false)"
  />

  <div class="cx-big-checkbox__indicator" aria-hidden="true">
    <span
      class="cx-big-checkbox__control"
      [class.cx-big-checkbox__control--checked]="selected$()"
      [class.cx-big-checkbox__control--indeterminate]="indeterminate$()"
    >
      @if (selected$()) {
        <span class="cx-big-checkbox__check"></span>
      }
    </span>
  </div>
  <div class="cx-big-checkbox__content">
    @if (custom) {
      <ng-content />
    } @else {
      @if (heading) {
        <div class="cx-big-checkbox__label">{{ heading }}</div>
      }
      @if (text) {
        <div class="cx-big-checkbox__description">{{ text }}</div>
      }
    }
  </div>
</label>
