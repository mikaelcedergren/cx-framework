<div class="cx-secret-display">
  <div class="cx-secret-display__value" role="text" [attr.aria-label]="valueAriaLabel()">
    <span class="cx-secret-display__value-text" aria-hidden="true">{{ displayValue() || ' ' }}</span>
  </div>

  <div class="cx-secret-display__actions">
    @if (masked) {
      <button
        type="button"
        class="cx-secret-display__btn"
        [attr.aria-label]="revealLabel()"
        [attr.aria-pressed]="!isHidden()"
        (click)="toggleReveal()"
      >
        @if (isHidden()) {
          <svg class="cx-secret-display__btn-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        } @else {
          <svg class="cx-secret-display__btn-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17.94 17.94A10.9 10.9 0 0 1 12 19c-6.5 0-10-7-10-7a18.4 18.4 0 0 1 4.06-5.06" />
            <path d="M9.9 5.1A10.9 10.9 0 0 1 12 5c6.5 0 10 7 10 7a18.4 18.4 0 0 1-2.16 3.15" />
            <line x1="1" y1="1" x2="23" y2="23" />
            <path d="M9.88 9.88A3 3 0 0 0 14.12 14.12" />
          </svg>
        }
      </button>
    }

    <button
      type="button"
      class="cx-secret-display__btn cx-secret-display__btn-copy"
      [class.is-copied]="copyState() === 'copied'"
      [class.is-failed]="copyState() === 'failed'"
      [attr.aria-label]="copyAriaLabel()"
      [disabled]="!value"
      (click)="copy()"
    >
      <span class="cx-secret-display__btn-icon-wrap" aria-hidden="true">
        @switch (copyState()) {
          @case ('copied') {
            <svg class="cx-secret-display__btn-icon" viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12" />
            </svg>
          }
          @case ('failed') {
            <svg class="cx-secret-display__btn-icon" viewBox="0 0 24 24">
              <line x1="12" y1="8" x2="12" y2="13" />
              <line x1="12" y1="16" x2="12" y2="16" />
              <circle cx="12" cy="12" r="9" />
            </svg>
          }
          @default {
            <svg class="cx-secret-display__btn-icon" viewBox="0 0 24 24">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
          }
        }
      </span>
      <span class="cx-secret-display__btn-label">{{ copyLabel() }}</span>
    </button>
  </div>
</div>
