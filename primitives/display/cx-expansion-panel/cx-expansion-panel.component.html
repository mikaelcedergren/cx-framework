<div
  class="cx-expansion-panel"
  [class.cx-expansion-panel--expanded]="expanded$()"
  [class.cx-expansion-panel--flat]="variant === 'flat'"
  [class.cx-expansion-panel--active]="active"
>
  <button
    type="button"
    class="cx-expansion-panel__trigger"
    [attr.aria-expanded]="expanded$()"
    [attr.aria-controls]="contentId"
    (click)="toggle()"
  >
    <span class="cx-expansion-panel__header">
      <span class="cx-expansion-panel__title">{{ heading }}</span>
      @if (active) {
        <span class="cx-expansion-panel__active-dot" aria-hidden="true"></span>
      }
    </span>
    <span class="cx-expansion-panel__meta" aria-hidden="true">
      <cx-icon
        class="cx-expansion-panel__chevron"
        name="chevron-down"
        [size]="16"
      />
    </span>
  </button>

  <div
    class="cx-expansion-panel__content-shell"
    [class.cx-expansion-panel__content-shell--expanded]="expanded$()"
    [id]="contentId"
    [attr.aria-hidden]="expanded$() ? null : 'true'"
  >
    <div class="cx-expansion-panel__content">
      <ng-content />
    </div>
  </div>
</div>
