<span
  class="cx-badge"
  [class.cx-badge--inline]="placement === 'inline'"
  [class.cx-badge--corner]="placement === 'corner'"
  [class.cx-badge--visible]="visible"
  [class.cx-badge--with-count]="visible && hasCount()"
  [class.cx-badge--default]="mood === 'default'"
  [class.cx-badge--danger]="mood === 'danger'"
>
  <span
    class="cx-badge__content"
    [class.cx-badge__content--cutout]="placement === 'corner' && visible"
    [style.--cx-badge-cutout-width]="cutoutWidth()"
    [style.--cx-badge-cutout-height]="cutoutHeight()"
  >
    <ng-content />
  </span>

  @if (visible) {
    <span
      class="cx-badge__indicator"
      [class.cx-badge__indicator--dot]="!hasCount()"
      [class.cx-badge__indicator--count]="hasCount()"
      [attr.role]="ariaLabel?.trim() ? 'img' : null"
      [attr.aria-label]="ariaLabel?.trim() || null"
    >
      @if (hasCount()) {
        <span class="cx-badge__value">{{ displayValue() }}</span>
      }
    </span>
  }
</span>
